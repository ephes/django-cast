<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Theme Comparison</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f5; }
      .toolbar {
        display: flex; align-items: center; gap: 1rem;
        padding: 0.75rem 1rem; background: #333; color: #fff;
      }
      .toolbar label { font-size: 0.875rem; }
      .toolbar input[type="text"] {
        padding: 0.375rem 0.5rem; border: 1px solid #555;
        background: #444; color: #fff; border-radius: 3px; width: 300px;
      }
      .toolbar button {
        padding: 0.375rem 0.75rem; border: none; background: #0066cc;
        color: #fff; border-radius: 3px; cursor: pointer;
      }
      .toolbar button:hover { background: #0055aa; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        gap: 0; height: calc(100vh - 50px);
      }
      .theme-panel { display: flex; flex-direction: column; border: 1px solid #ddd; }
      .theme-panel-header {
        padding: 0.375rem 0.75rem; background: #e8e8e8;
        font-size: 0.8125rem; font-weight: 600; border-bottom: 1px solid #ddd;
      }
      .theme-panel iframe {
        flex: 1; width: 100%; border: none;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <label for="path-input">Path:</label>
      <form method="get" style="display: flex; gap: 0.5rem; align-items: center;">
        <input type="text" id="path-input" name="path" value="{{ path }}">
        <button type="submit">Go</button>
      </form>
    </div>
    <div class="grid">
      {% for slug, name in themes %}
        <div class="theme-panel">
          <div class="theme-panel-header">{{ name }} ({{ slug }})</div>
          <iframe src="{{ path }}{% if '?' in path %}&amp;{% else %}?{% endif %}theme={{ slug }}" title="{{ name }}"></iframe>
        </div>
      {% endfor %}
    </div>
  </body>
</html>
