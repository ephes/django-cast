{% load i18n wagtailadmin_tags %}
<button
  type="submit"
  name="{{ name }}"
  value="{{ label }}"
  class="button button-longrunning{% if classname %} {{ classname }}{% endif %}"
  formaction="{{ action_url }}"
  formmethod="post"
  formnovalidate
  {% if transcript_generation_active %}disabled{% endif %}
  data-controller="w-progress"
  data-action="w-progress#activate"
  data-w-progress-active-value="{% trans 'Queuing transcript generation…' %}"
>
  {% if icon_name %}{% icon name=icon_name classname="button-longrunning__icon" %}{% endif %}
  {% icon name="spinner" %}
  <em data-w-progress-target="label">{{ label }}</em>
</button>
