{# Default placement of the custom audio player. The .cast-player__panels wrapper #}
{# groups the two compact Transcript/Chapters buttons into one row; themes may #}
{# relocate the <cast-transcript>/<cast-chapters> elements anywhere on the detail #}
{# page by moving them while keeping the same `for=` id. #}
{{ player_script }}
<cast-audio-player id="{{ player_id }}" data-payload="{{ payload_id }}"></cast-audio-player>
<div class="cast-player__panels">
  <cast-transcript for="{{ player_id }}"></cast-transcript>
  <cast-chapters for="{{ player_id }}" data-mode="list"></cast-chapters>
</div>
