[tox]
envlist =
    py{311,312}-django42-wagtail70
    py{311,312,313}-django52-wagtail{70,7latest}
    py314-django52-wagtail7latest
    py{312,313,314}-django60-wagtail7latest

isolated_build = true

[testenv]
package = wheel
wheel_build_env = .pkg
runner = uv-venv-runner
deps =
    django42: Django>=4.2,<5
    django52: Django>=5.2,<6
    django60: Django>=6.0,<7
    wagtail70: wagtail>=7.0,<7.1
    wagtail7latest: wagtail>=7.4,<8
    pytest >= 6
    pytest-django
    pytest-mock
    pytest-randomly
    pytz
    factory_boy
    feedparser

setenv =
    DJANGO_SETTINGS_MODULE=tests.settings
    PYTHONPATH={toxinidir}/src
    CAST_TEST_DB={toxworkdir}/{envname}-test_database.sqlite3
commands =
    python manage.py migrate --noinput
    python -m pytest -q

[testenv:fast]
# Quick test environment for development
package = wheel
wheel_build_env = .pkg
runner = uv-venv-runner
deps =
    Django>=6.0,<7
    wagtail>=7.0,<8
    pytest >= 6
    pytest-django
    pytest-mock
    pytest-randomly
    pytz
    factory_boy
    feedparser
setenv =
    DJANGO_SETTINGS_MODULE=tests.settings
    PYTHONPATH={toxinidir}/src
    CAST_TEST_DB={toxworkdir}/{envname}-test_database.sqlite3
commands =
    python manage.py migrate --noinput
    python -m pytest -q --tb=short

[testenv:cleanup]
skip_install = true
isolated_build = false
deps =
commands =
    rm -f tests/test_database.sqlite3 {toxworkdir}/*-test_database.sqlite3
    echo "All tests done!"

allowlist_externals =
    rm
    echo

[testenv:pre-commit]
deps = pre-commit
commands = pre-commit run --all-files
